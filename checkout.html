<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout Script Malware Premium</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { 
  background: linear-gradient(160deg,#020617,#0f172a,#020617); 
  color:#f9fafb; 
}

.qr-glow img { 
  animation: glow 2s infinite alternate; 
  object-fit: contain;
  width: 100%;
  height: 100%;
}

@keyframes glow { 
  from { box-shadow:0 0 10px #22c55e; } 
  to { box-shadow:0 0 30px #22c55e; } 
}

.btn-back {
  padding: 0.75rem 1rem;
  font-weight: 600;
  font-size: 1rem;
  border-radius: 12px;
  width: 100%;
  max-width: 460px;
  transition: 0.2s;
}

.btn-back:hover {
  background-color: #22c55e;
  color: #020617;
  border-color: #22c55e;
}
</style>
</head>
<body>

<div class="container py-5 d-flex flex-column align-items-center">

  <div class="card border-0 shadow-lg w-100 mb-3" style="max-width:460px;background:#020617f2;border-radius:22px;">
    <div class="card-body p-4">

      <div class="text-center mb-3">
        <span class="badge bg-warning text-dark px-3 py-2 mb-2">
          <i class="bi bi-lightning-charge-fill"></i> PREMIUM SCRIPT
        </span>
        <h4 class="fw-bold mt-2 text-white" id="pkgName">Premium Script Malware</h4>
        <p class="small fw-medium text-light">Full fitur • Lifetime • Support aktif</p>
      </div>

      <div class="bg-black bg-opacity-75 rounded-4 p-3 text-center mb-2">
        <div class="fs-3 fw-bold text-success" id="pkgPrice">IDR 0</div>
      </div>

      <div id="contentArea"></div>

    </div>
  </div>

  <a href="payment.html" class="btn btn-outline-light btn-back">
    <i class="bi bi-arrow-left"></i> Back
  </a>

</div>

<script>
const QR_IMAGE = "Qris.png";

// Ambil query
const urlParams = new URLSearchParams(window.location.search);
const packageName = urlParams.get('package') || "Unknown";
const price = parseInt(urlParams.get('price')) || 0;

// 🔥 GENERATE KEY 24 KARAKTER
function generateKey(length = 8) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let result = "";
  for (let i = 0; i < length; i++) {
    result += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return result;
}

// Generate order
const order = {
  order_id: "ORD" + Date.now() + Math.random().toString(16).slice(2,8),
  amount: price,
  key: generateKey(),
  package: packageName
};

// Render data
document.getElementById("pkgName").innerText = order.package;
document.getElementById("pkgPrice").innerText = "IDR " + order.amount.toLocaleString("id-ID");

const DANA_NUMBER = "0123456789";

const content = document.getElementById("contentArea");
content.innerHTML = `

<div class="bg-dark bg-opacity-75 rounded-4 p-3 mb-3 small">
  
  <div class="text-center">
    <div class="fw-semibold text-white">Order ID</div>
    <div class="fw-bold text-white mb-2">${order.order_id}</div>
  </div>

  <hr>

  <div class="fw-semibold text-white text-center">Total Bayar</div>
  <div class="fw-bold text-success text-center mb-3">
    IDR ${order.amount.toLocaleString("id-ID")}
  </div>

  <div class="fw-semibold text-white text-center mb-1">Kode Script Malware</div>

  <!-- 🔥 KEY + BUTTON KANAN -->
  <div class="d-flex align-items-center justify-content-between bg-black bg-opacity-50 rounded-3 px-2 py-2">
    
    <div class="text-warning small fw-bold text-truncate" id="keyText">
      ${order.key}
    </div>

    <button class="btn btn-sm btn-outline-warning ms-2" onclick="copyKey()">
      <i class="bi bi-clipboard"></i>
    </button>

  </div>

  <div id="copyKeyMsg" class="text-success small mt-2 text-center" style="display:none;">
    Copied success
  </div>

</div>

<!-- PAYMENT -->
<div class="bg-dark bg-opacity-75 rounded-4 p-3 mb-3 text-center">
  <div class="fw-semibold text-white mb-2">
    <img src="https://upload.wikimedia.org/wikipedia/commons/7/72/Logo_dana_blue.svg" 
     style="height:20px;">
  </div>

  <div class="fs-5 fw-bold text-info mb-2" id="danaNumber">
    ${DANA_NUMBER}
  </div>

  <button class="btn btn-sm btn-outline-info" onclick="copyDana()">
    <i class="bi bi-clipboard"></i> Salin Nomor
  </button>

  <div id="copyMsg" class="text-success small mt-2" style="display:none;">
    Copied success
  </div>
</div>

<!-- QRIS -->
<div class="ratio ratio-1x1 mb-3 qr-glow">
  <div class="rounded-4 p-2 d-flex align-items-center justify-content-center" style="background: #0f172a;">
    <img src="${QR_IMAGE}" class="img-fluid">
  </div>
</div>

<div class="bg-dark bg-opacity-75 rounded-4 p-3 mb-3 small fw-semibold text-white"> 
<div>① Scan QR</div> <div>② Bayar via e-wallet / m-banking</div> </div> ;
`;

// COPY DANA
function copyDana() {
  const text = document.getElementById("danaNumber").innerText;
  navigator.clipboard.writeText(text);

  const msg = document.getElementById("copyMsg");
  msg.style.display = "block";

  setTimeout(() => msg.style.display = "none", 1000);
}

// COPY KEY
function copyKey() {
  const text = document.getElementById("keyText").innerText;
  navigator.clipboard.writeText(text);

  const msg = document.getElementById("copyKeyMsg");
  msg.style.display = "block";

  setTimeout(() => msg.style.display = "none", 1000);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
